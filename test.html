<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบค้นหาและบันทึกข้อมูลประชากร</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f4f4f4; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0056b3; }
    .btn-save { background: #28a745; float: right; margin-top: 10px; }
    .btn-save:hover { background: #218838; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #eee; }
    .text-center { text-align: center; }
  </style>
</head>
<body>

  <div class="card">
    <h2>🔎 ค้นหาข้อมูลประชากร</h2>
    <input type="text" id="idCardInput" placeholder="กรอกเลขบัตรประชาชน 13 หลัก" maxlength="13">
    <button onclick="searchData()">ค้นหา</button>
    <div id="loadingText" style="display:none; color: blue; margin-top: 10px;">⏳ กำลังโหลด...</div>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <h3>📊 ผลการค้นหา</h3>
    <table>
      <thead>
        <tr>
          <th class="text-center">เลือก</th>
          <th>ชื่อ</th>
          <th>นามสกุล</th>
          <th>จังหวัด</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <button class="btn-save" onclick="saveData()">บันทึกรายการที่เลือก</button>
    <div style="clear:both;"></div>
  </div>

  <script>
    // 💡 วางลิงก์ Web App ที่ได้จาก Google Apps Script ทับตรงนี้ (ต้องลงท้ายด้วย /exec)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyss_zHh0OcITnBgf86OQCL_TMBbWLuyYkQpI2gyQIzXPYOlW0VLOo5O1i2gs2RC13a/exec";

    // 🔍 1. ฟังก์ชันค้นหา
    function searchData() {
      const idCard = document.getElementById('idCardInput').value;
      if(idCard.length < 13) { alert('กรุณากรอกให้ครบ 13 หลัก'); return; }

      document.getElementById('loadingText').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "search", idCardNumber: idCard })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('loadingText').style.display = 'none';
        
        // ถ้าหลังบ้านส่ง error กลับมาในรูปแบบ JSON ให้แจ้งเตือนทันที
        if(data.status === "error") { alert("เกิดข้อผิดพลาดจากหลังบ้าน: " + data.message); return; }

        document.getElementById('resultCard').style.display = 'block';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center">ไม่พบข้อมูล</td></tr>';
          return;
        }

        data.forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="text-center"><input type="checkbox" class="row-select" data-info='${JSON.stringify(item)}'></td>
            <td>${item.columnB}</td>
            <td>${item.columnC}</td>
            <td>${item.columnG}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => {
        document.getElementById('loadingText').style.display = 'none';
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย: ' + err.message);
      });
    }

    // 💾 2. ฟังก์ชันบันทึกข้อมูล
    function saveData() {
      const checkboxes = document.querySelectorAll('.row-select');
      const selectedData = [];

      checkboxes.forEach(box => {
        if(box.checked) {
          selectedData.push(JSON.parse(box.getAttribute('data-info')));
        }
      });

      if(selectedData.length === 0) { alert('กรุณาเลือกอย่างน้อย 1 รายการ'); return; }

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "save", selectedData: selectedData })
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          alert('🎉 บันทึกข้อมูลเข้าอีกชีทสำเร็จแล้วครับ!');
          checkboxes.forEach(box => box.checked = false); // ล้างติ๊กถูก
        } else {
          alert('หลังบ้านแจ้งเออร์เรอร์: ' + data.message);
        }
      })
      .catch(err => alert('ไม่สามารถส่งข้อมูลไปบันทึกได้: ' + err.message));
    }
  </script>
</body>
</html>
